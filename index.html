<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/mystyle.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Webshop terméklista</title>
</head>
<body class="body">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">WebShop</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Kezdőlap</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="#">Kosár</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<h1 class="hh1">Termékeink</h1>

<div class="container mt-5">
    <div class="row">

        <div class="col-4 mb-4">
            <div class="card h-100 shadow">
                <span class="badge bg-danger akcio">Akció</span>
                <img src="img/cola.jpg" class="card-img-top" alt="termek1">
                <div class="card-body text-center">
                    <h5 class="card-title">Coca-Cola</h5>
                    <p class="card-text">
                        <span class="regi-ar">600 Ft</span>
                        <strong class="ar-akcio">400 Ft</strong>
                    </p>
                    <button class="btn btn-info">Kosárba</button>
                </div>
            </div>
        </div>

        <div class="col-4 mb-4">
            <div class="card h-100 shadow">
                <img src="img/lays.jpg" class="card-img-top" alt="termek2">
                <div class="card-body text-center">
                    <h5 class="card-title">Lays Chips</h5>
                    <p class="card-text">
                        <strong class="ar">1.200 Ft</strong>
                    </p>
                    <button class="btn btn-info">Kosárba</button>
                </div>
            </div>
        </div>

        <div class="col-4 mb-4">
            <div class="card h-100 shadow">
                <span class="badge bg-danger akcio">Akció</span>
                <img src="img/milka.jpg" class="card-img-top" alt="termek3">
                <div class="card-body text-center">
                    <h5 class="card-title">Milka csokoládé (cseresznyés)</h5>
                    <p class="card-text">
                        <span class="regi-ar">400 Ft</span>
                        <strong class="ar-akcio">300 Ft</strong>
                    </p>
                    <button class="btn btn-info">Kosárba</button>
                </div>
            </div>
        </div>

        <div class="col-4 mb-4">
            <div class="card h-100 shadow">
                <img src="img/oreo.jpg" class="card-img-top" alt="termek4">
                <div class="card-body text-center">
                    <h5 class="card-title">Oreo keksz</h5>
                    <p class="card-text">
                        <strong class="ar">1.200 Ft</strong>
                    </p>
                    <button class="btn btn-info">Kosárba</button>
                </div>
            </div>
        </div>

        <div class="col-4 mb-4">
            <div class="card h-100 shadow">
                <img src="img/viz.jpg" class="card-img-top" alt="termek5">
                <div class="card-body text-center">
                    <h5 class="card-title">NaturAqua ásványvíz</h5>
                    <p class="card-text">
                        <strong class="ar">150 Ft</strong>
                    </p>
                    <button class="btn btn-info">Kosárba</button>
                </div>
            </div>
        </div>

        <div class="col-4 mb-4">
            <div class="card h-100 shadow">
                <img src="img/haribo.jpg" class="card-img-top" alt="termek6">
                <div class="card-body text-center">
                    <h5 class="card-title">Haribo gumicukor</h5>
                    <p class="card-text">
                        <strong class="ar">500 Ft</strong>
                    </p>
                    <button class="btn btn-info">Kosárba</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3">
    <h5 class="mb-0">| www.webshop.hu |</h5>
</footer>

</body>
</html>
